[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crypto-lstm-prediction"
version = "0.1.0"
description = "Bitcoin price forecasting with an LSTM model and FastAPI service."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115",
  "joblib>=1.4",
  "matplotlib>=3.8",
  "numpy>=1.26",
  "pandas>=2.2",
  "requests>=2.32",
  "scikit-learn>=1.4",
  "tensorflow>=2.16",
  "uvicorn[standard]>=0.30",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
]

[project.scripts]
crypto-lstm = "crypto_lstm.cli:main"
crypto-lstm-collect = "crypto_lstm.cli:collect"
crypto-lstm-train = "crypto_lstm.cli:train"
crypto-lstm-forecast = "crypto_lstm.cli:forecast"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

